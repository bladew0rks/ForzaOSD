[ABOUT]
NAME =GT7 HUD
AUTHOR = Inori
VERSION = 1.1.2
DESCRIPTION = Replica Gran Turismo 7 HUD Components


[CORE]
LAZY = 1 

[UI_CALLBACKS]
IN_GAME = startingSequence

[WINDOW_...]
ID = main
NAME = GT7 UI Config
FUNCTION_MAIN = windowMain
SIZE = 400, 500
FLAGS = SETTINGS
ICON = icons/settings.png

[WINDOW_...]
PADDING = 0,0
ID = tachometer
NAME = GT7 UI Speedometer
FUNCTION_MAIN = tachHUD
FUNCTION_ON_SHOW = onShowWindowMain
SIZE = 10, 10
FLAGS = AUTO_RESIZE,NO_COLLAPSE,NO_SCROLLBAR,NO_SCROLL_WITH_MOUSE,NO_BACKGROUND,FADING
ICON = icons/tach.png

