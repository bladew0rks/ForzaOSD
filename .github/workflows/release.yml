name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Validate tag version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          [xml] $props = Get-Content Directory.Build.props
          $projectVersion = ([string] $props.Project.PropertyGroup.Version).Trim()
          if ($version -ne $projectVersion) {
              throw "Tag version '$version' does not match project version '$projectVersion'."
          }
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Restore
        run: dotnet restore ForzaOSD.slnx

      - name: Build
        run: dotnet build ForzaOSD.slnx -c Release --no-restore

      - name: Test
        run: dotnet test src/ForzaOSD.Tests/ForzaOSD.Tests.csproj -c Release --no-build

      - name: Package release
        shell: pwsh
        run: ./build.ps1 -Version $env:RELEASE_VERSION

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem dist/*.zip | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash *$($_.Name)"
          } | Set-Content dist/SHA256SUMS.txt

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/*.zip
          dist/SHA256SUMS.txt
          --verify-tag
          --generate-notes
          --title "${{ github.ref_name }}"
